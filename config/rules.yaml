# config/rules.yaml - Regles de detection Python.PHP.Whitebox
# 16 types de vulnerabilites avec CWE, OWASP, sanitizers contextuels

version: "2.0"

# --- Sources de taint (entrees utilisateur) ---
sources:
  superglobals:
    - "$_GET"
    - "$_POST"
    - "$_COOKIE"
    - "$_REQUEST"
    - "$_SERVER"
    - "$_FILES"
    - "$_ENV"
    - "$argv"
  dangerous_server_keys:
    - "HTTP_HOST"
    - "HTTP_REFERER"
    - "HTTP_USER_AGENT"
    - "HTTP_X_FORWARDED_FOR"
    - "REQUEST_URI"
    - "QUERY_STRING"
    - "PATH_INFO"
    - "PHP_SELF"
  functions:
    - "file_get_contents"
    - "fread"
    - "fgets"
    - "readline"
    - "getenv"
    - "apache_request_headers"

# --- Propagateurs (fonctions qui transmettent le taint) ---
propagators:
  - "trim"
  - "ltrim"
  - "rtrim"
  - "strtolower"
  - "strtoupper"
  - "substr"
  - "str_replace"
  - "str_ireplace"
  - "ucfirst"
  - "lcfirst"
  - "nl2br"
  - "wordwrap"
  - "str_pad"
  - "str_repeat"
  - "chunk_split"
  - "base64_encode"
  - "base64_decode"
  - "urldecode"
  - "rawurldecode"
  - "json_encode"
  - "json_decode"
  - "serialize"
  - "implode"
  - "join"
  - "sprintf"
  - "explode"
  - "str_split"
  - "preg_split"
  - "array_values"
  - "array_keys"
  - "array_pop"
  - "array_shift"
  - "current"
  - "next"
  - "reset"
  - "end"
  - "array_merge"
  - "compact"
  - "extract"

# --- Filtres contextuels (neutralisent des categories specifiques) ---
filters:
  htmlspecialchars:
    neutralizes: ["xss"]
  htmlentities:
    neutralizes: ["xss"]
  strip_tags:
    neutralizes: ["xss"]
    confidence: "medium"
  urlencode:
    neutralizes: ["xss", "open_redirect"]
  rawurlencode:
    neutralizes: ["xss", "open_redirect"]
  json_encode:
    neutralizes: ["xss"]
  mysqli_real_escape_string:
    neutralizes: ["sql_injection"]
  pg_escape_string:
    neutralizes: ["sql_injection"]
  pg_escape_literal:
    neutralizes: ["sql_injection"]
  "PDO::quote":
    neutralizes: ["sql_injection"]
  addslashes:
    neutralizes: ["sql_injection"]
    confidence: "low"
  escapeshellarg:
    neutralizes: ["rce"]
  escapeshellcmd:
    neutralizes: ["rce"]
    confidence: "medium"
  intval:
    neutralizes: ["sql_injection", "xss", "rce", "path_traversal", "ldap_injection"]
  floatval:
    neutralizes: ["sql_injection", "xss", "rce", "path_traversal"]
  abs:
    neutralizes: ["sql_injection", "xss", "rce"]
  basename:
    neutralizes: ["path_traversal", "file_inclusion"]
  realpath:
    neutralizes: ["path_traversal"]
    confidence: "medium"
  ldap_escape:
    neutralizes: ["ldap_injection"]
  filter_var:
    neutralizes: ["xss", "sql_injection"]
    confidence: "medium"
  filter_input:
    neutralizes: ["xss", "sql_injection"]
    confidence: "medium"
  ctype_digit:
    neutralizes: ["sql_injection", "xss", "rce", "path_traversal"]
  is_numeric:
    neutralizes: ["sql_injection", "xss", "rce"]
  # Casts PHP comme sanitizers
  _cast_int:
    neutralizes: ["sql_injection", "xss", "rce", "path_traversal", "ldap_injection"]
  _cast_float:
    neutralizes: ["sql_injection", "xss", "rce", "path_traversal"]
  _cast_bool:
    neutralizes: ["sql_injection", "xss", "rce", "path_traversal", "ldap_injection"]

# --- Vulnerabilites (sinks + metadata) ---
vulnerabilities:
  sql_injection:
    cwe: "CWE-89"
    owasp: "A03:2021 - Injection"
    severity: "critical"
    description: "User-controlled data reaches a SQL query without parameterization"
    sinks:
      - "mysqli_query"
      - "mysql_query"
      - "pg_query"
      - "sqlite_query"
      - "PDO::query"
      - "PDO::exec"
      - "oci_parse"
      - "mssql_query"
      - "sqlsrv_query"
      - "db2_exec"
    sanitizers:
      - "mysqli_real_escape_string"
      - "pg_escape_string"
      - "PDO::quote"
      - "addslashes"
      - "intval"
      - "floatval"
    remediation: "Use prepared statements with bound parameters. Never concatenate user input into SQL."

  xss:
    cwe: "CWE-79"
    owasp: "A03:2021 - Injection"
    severity: "high"
    description: "User-controlled data rendered in HTML output without encoding"
    sinks:
      - "echo"
      - "print"
      - "printf"
      - "vprintf"
      - "die"
      - "exit"
    node_types:
      - "echo_statement"
    sanitizers:
      - "htmlspecialchars"
      - "htmlentities"
      - "strip_tags"
      - "urlencode"
    remediation: "Apply htmlspecialchars($input, ENT_QUOTES, 'UTF-8') before output."

  rce:
    cwe: "CWE-78"
    owasp: "A03:2021 - Injection"
    severity: "critical"
    description: "User-controlled data reaches OS command execution"
    sinks:
      - "system"
      - "exec"
      - "shell_exec"
      - "passthru"
      - "popen"
      - "proc_open"
      - "pcntl_exec"
    sanitizers:
      - "escapeshellarg"
      - "escapeshellcmd"
    remediation: "Avoid passing user input to OS commands. Use escapeshellarg() if unavoidable."

  code_injection:
    cwe: "CWE-94"
    owasp: "A03:2021 - Injection"
    severity: "critical"
    description: "User-controlled data executed as PHP code"
    sinks:
      - "assert"
      - "preg_replace"
      - "create_function"
      - "call_user_func"
      - "call_user_func_array"
    sanitizers: []
    remediation: "Never pass user input to code execution functions. Use preg_replace_callback() instead of /e modifier."

  file_inclusion:
    cwe: "CWE-98"
    owasp: "A03:2021 - Injection"
    severity: "critical"
    description: "User-controlled data determines included file path (LFI/RFI)"
    node_types:
      - "include_expression"
      - "require_expression"
      - "include_once_expression"
      - "require_once_expression"
    sinks: []
    sanitizers:
      - "basename"
      - "realpath"
    remediation: "Use a whitelist of allowed files. Never include user-controlled paths."

  path_traversal:
    cwe: "CWE-22"
    owasp: "A01:2021 - Broken Access Control"
    severity: "high"
    description: "User-controlled data in filesystem operations allows directory traversal"
    sinks:
      - "fopen"
      - "file_get_contents"
      - "file_put_contents"
      - "readfile"
      - "file"
      - "unlink"
      - "rename"
      - "copy"
      - "mkdir"
      - "rmdir"
    sanitizers:
      - "basename"
      - "realpath"
    remediation: "Use basename() and validate with realpath() against allowed directories."

  insecure_upload:
    cwe: "CWE-434"
    owasp: "A04:2021 - Insecure Design"
    severity: "high"
    description: "File upload without proper type/size/content validation"
    sinks:
      - "move_uploaded_file"
    sanitizers: []
    remediation: "Validate MIME type, extension (whitelist), and size. Store outside webroot."

  insecure_deserialization:
    cwe: "CWE-502"
    owasp: "A08:2021 - Software and Data Integrity Failures"
    severity: "critical"
    description: "User-controlled data passed to unserialize()"
    sinks:
      - "unserialize"
    sanitizers: []
    remediation: "Use json_decode() instead. If unserialize needed, use allowed_classes option."

  ssrf:
    cwe: "CWE-918"
    owasp: "A10:2021 - SSRF"
    severity: "high"
    description: "User-controlled data determines target of server-side HTTP requests"
    sinks:
      - "curl_exec"
      - "curl_multi_exec"
      - "file_get_contents"
      - "fopen"
      - "get_headers"
      - "fsockopen"
    sanitizers:
      - "filter_var"
    remediation: "Validate and whitelist hostnames. Block internal/private IP ranges."

  xxe:
    cwe: "CWE-611"
    owasp: "A05:2021 - Security Misconfiguration"
    severity: "high"
    description: "XML parsing without disabling external entity loading"
    sinks:
      - "simplexml_load_string"
      - "simplexml_load_file"
      - "DOMDocument::loadXML"
      - "DOMDocument::load"
      - "XMLReader::open"
      - "XMLReader::xml"
      - "xml_parse"
    sanitizers: []
    remediation: "Call libxml_disable_entity_loader(true). Use LIBXML_NONET flag."

  open_redirect:
    cwe: "CWE-601"
    owasp: "A01:2021 - Broken Access Control"
    severity: "medium"
    description: "User-controlled data in HTTP redirect location"
    sinks:
      - "header"
    sanitizers:
      - "filter_var"
      - "urlencode"
    remediation: "Validate redirect URL against a whitelist of trusted domains."

  ldap_injection:
    cwe: "CWE-90"
    owasp: "A03:2021 - Injection"
    severity: "high"
    description: "User-controlled data in LDAP queries without escaping"
    sinks:
      - "ldap_search"
      - "ldap_bind"
      - "ldap_list"
      - "ldap_read"
      - "ldap_mod_add"
      - "ldap_mod_replace"
    sanitizers:
      - "ldap_escape"
    remediation: "Use ldap_escape() on all user input in LDAP filters."

  crypto_weakness:
    cwe: "CWE-327"
    owasp: "A02:2021 - Cryptographic Failures"
    severity: "medium"
    detection_mode: "pattern"
    description: "Use of weak cryptographic algorithms"
    sinks:
      - "md5"
      - "sha1"
      - "crc32"
    patterns:
      - pattern: "md5\\s*\\("
        message: "MD5 used for hashing (weak for passwords)"
      - pattern: "sha1\\s*\\("
        message: "SHA1 used for hashing (weak for passwords)"
      - pattern: "\\brand\\s*\\("
        message: "rand() is not cryptographically secure"
      - pattern: "\\bmt_rand\\s*\\("
        message: "mt_rand() is not cryptographically secure"
    sanitizers: []
    remediation: "Use password_hash()/password_verify() for passwords. Use random_bytes() for randomness."

  hardcoded_secrets:
    cwe: "CWE-798"
    owasp: "A07:2021 - Identification and Authentication Failures"
    severity: "high"
    detection_mode: "pattern"
    description: "Credentials or keys hardcoded in source code"
    sinks: []
    patterns:
      - pattern: "(?i)(password|passwd|pwd)\\s*=\\s*['\"][^'\"]{4,}['\"]"
        message: "Hardcoded password detected"
      - pattern: "(?i)(api_key|apikey|api_secret|secret_key)\\s*=\\s*['\"][^'\"]{8,}['\"]"
        message: "Hardcoded API key detected"
      - pattern: "(?i)(token|access_token|auth_token)\\s*=\\s*['\"][^'\"]{8,}['\"]"
        message: "Hardcoded token detected"
      - pattern: "(?i)(aws_access_key_id|aws_secret_access_key)\\s*=\\s*['\"][^'\"]+['\"]"
        message: "Hardcoded AWS credential detected"
      - pattern: "(?i)AKIA[0-9A-Z]{16}"
        message: "AWS Access Key ID detected"
      - pattern: "(?i)(mysql|pgsql|mongo|redis)://.+:.+@"
        message: "Hardcoded database connection string"
      - pattern: "-----BEGIN (RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----"
        message: "Private key in source code"
    sanitizers: []
    remediation: "Store secrets in environment variables or a secrets manager."

  session_fixation:
    cwe: "CWE-384"
    owasp: "A07:2021 - Identification and Authentication Failures"
    severity: "medium"
    description: "Session ID set from user-controlled input"
    sinks:
      - "session_id"
    sanitizers: []
    remediation: "Never set session_id() from user input. Call session_regenerate_id(true) after auth."

  type_juggling:
    cwe: "CWE-697"
    owasp: "A07:2021 - Identification and Authentication Failures"
    severity: "medium"
    detection_mode: "pattern"
    description: "Loose comparison (==) in security-sensitive context"
    sinks: []
    patterns:
      - pattern: "==\\s*['\"]0e"
        message: "Magic hash comparison vulnerable to type juggling"
    sanitizers: []
    remediation: "Use strict comparison (===). Use hash_equals() for timing-safe comparison."

# --- Patterns de configuration dangereuse ---
dangerous_configs:
  - pattern: "display_errors\\s*=\\s*(On|1|true)"
    severity: "medium"
    cwe: "CWE-209"
    message: "display_errors enabled - information exposure"
  - pattern: "allow_url_include\\s*=\\s*(On|1|true)"
    severity: "critical"
    cwe: "CWE-98"
    message: "allow_url_include enabled - remote file inclusion"
  - pattern: "allow_url_fopen\\s*=\\s*(On|1|true)"
    severity: "medium"
    cwe: "CWE-918"
    message: "allow_url_fopen enabled - SSRF risk"
